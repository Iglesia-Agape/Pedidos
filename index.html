<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2C1810">
<title>Pedidos · Ágape Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --espresso:#2C1810;
    --tostado:#6F4E37;
    --caramelo:#C99B5C;
    --crema:#F7F1E6;
    --crema-2:#FBF7EF;
    --blanco:#FFFFFF;
    --salvia:#3D5A45;
    --salvia-dark:#2E4536;
    --rojo:#A3432F;
    --linea:#E6DCC8;
    --sombra:0 8px 24px rgba(44,24,16,0.08);
    --sombra-fuerte:0 14px 34px rgba(44,24,16,0.16);
    --radio:18px;
    --header-h:128px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--crema);
    color:var(--espresso);
    -webkit-tap-highlight-color:transparent;
    padding-bottom:148px;
    min-height:100vh;
  }

  h1,h2,h3,h4{font-family:'Fraunces',serif; margin:0;}

  /* ===== HEADER ===== */
  .app-header{
    position:sticky; top:0; z-index:1000;
    background:linear-gradient(180deg, var(--espresso) 0%, #3a2418 100%);
    box-shadow:var(--sombra-fuerte);
  }
  .brand-row{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1280px; margin:0 auto; padding:14px 20px 10px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand-mark{
    width:38px; height:38px; border-radius:50%;
    background:var(--caramelo);
    display:flex; align-items:center; justify-content:center;
    font-size:19px; flex-shrink:0;
  }
  .brand-text h1{
    color:var(--crema); font-size:19px; font-weight:600; letter-spacing:.2px; line-height:1.1;
  }
  .brand-text span{
    display:block; color:var(--caramelo); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; font-weight:600; margin-top:2px;
  }
  .cart-pill{
    display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    color:var(--crema);
    padding:9px 14px; border-radius:999px;
    font-size:14px; font-weight:600;
    cursor:pointer; transition:background .2s;
    font-family:'Inter',sans-serif;
  }
  .cart-pill:active{background:rgba(255,255,255,0.18);}
  .cart-pill .cart-count{
    background:var(--caramelo); color:var(--espresso);
    min-width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800;
  }

  .tabs{
    display:flex; gap:8px; max-width:1280px; margin:0 auto;
    padding:0 16px 14px; overflow-x:auto; scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{
    border:none; background:rgba(255,255,255,0.07); color:#E9DFCE;
    padding:11px 18px; border-radius:12px; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px;
    white-space:nowrap; flex-shrink:0; transition:.2s; letter-spacing:.2px;
    display:flex; align-items:center; gap:7px;
  }
  .tab-btn .tab-emoji{font-size:16px;}
  .tab-btn.active{
    background:var(--caramelo); color:var(--espresso);
    box-shadow:0 4px 12px rgba(201,155,92,0.4);
  }

  /* ===== MAIN ===== */
  .menu-container{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:16px; padding:22px 16px 10px; max-width:1200px; margin:auto;
  }
  .seccion-productos{display:none;}
  .seccion-productos.active{display:grid;}

  .section-intro{
    grid-column:1/-1;
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:4px;
  }
  .section-intro h2{font-size:24px; color:var(--espresso); font-weight:600;}
  .section-intro .section-count{
    font-size:13px; color:var(--tostado); font-family:'Inter',sans-serif; font-weight:600;
  }

  .row-titulo{
    grid-column:1/-1; margin:18px 0 2px; padding-top:14px;
    border-top:1px solid var(--linea);
    display:flex; align-items:center; gap:10px;
  }
  .row-titulo h3{font-size:19px; color:var(--tostado); font-weight:600;}

  /* ===== PRODUCT CARD ===== */
  .product-card{
    background:var(--blanco); border-radius:var(--radio);
    padding:14px 14px 16px; text-align:center;
    box-shadow:var(--sombra); border:1px solid rgba(44,24,16,0.04);
    display:flex; flex-direction:column;
    position:relative; transition:box-shadow .2s, transform .2s;
  }
  .product-card.has-qty{
    box-shadow:0 0 0 2px var(--salvia), var(--sombra);
  }
  .qty-flag{
    position:absolute; top:10px; right:10px;
    background:var(--salvia); color:#fff;
    font-size:12px; font-weight:800; font-family:'Inter',sans-serif;
    min-width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(.5); transition:.2s;
    z-index:2;
  }
  .qty-flag.show{opacity:1; transform:scale(1);}

  .product-img-wrap{
    width:100%; aspect-ratio:4/3; border-radius:14px;
    background:var(--crema-2); margin-bottom:10px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; border:1px solid var(--linea);
  }
  .product-img{
    width:100%; height:100%; object-fit:contain; padding:8px;
  }

  .product-card h3.pname{
    font-size:15.5px; color:var(--espresso); font-weight:600;
    font-family:'Inter',sans-serif; line-height:1.3; min-height:2.4em;
    display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:2px; gap:2px;
  }
  .pname .pname-text{display:block;}
  .pname .vol-tag{
    font-size:11.5px; color:var(--tostado); font-weight:600; display:block;
  }

  .size-selector{display:flex; justify-content:center; gap:6px; margin:8px 0 2px;}
  .size-btn{
    background:var(--crema-2); border:1.5px solid var(--linea); color:var(--tostado);
    padding:6px 14px; border-radius:999px; cursor:pointer;
    font-weight:700; font-size:12.5px; font-family:'Inter',sans-serif; transition:.15s;
  }
  .size-btn.selected{background:var(--espresso); color:var(--crema); border-color:var(--espresso);}

  .price-tag{
    margin:6px 0 10px; font-weight:800; color:var(--rojo); font-size:17px;
    font-family:'Inter',sans-serif;
  }

  .controls{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    margin-top:auto;
  }
  .controls.with-sizes{font-size:13px;}
  .btn-qty{
    border:none; background:var(--espresso); color:var(--crema);
    width:38px; height:38px; border-radius:50%; cursor:pointer;
    font-size:19px; font-weight:700; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s, background .15s;
  }
  .btn-qty:active{transform:scale(0.88); background:var(--salvia);}
  .btn-qty.minus{background:var(--crema-2); color:var(--espresso); border:1.5px solid var(--linea);}
  .btn-qty.minus:active{background:var(--linea);}

  .qty-display{
    font-size:21px; font-weight:800; color:var(--espresso); min-width:28px;
    text-align:center; font-family:'Inter',sans-serif;
  }
  .size-breakdown{
    flex:1; text-align:center; color:var(--tostado); font-weight:600;
    line-height:1.3;
  }
  .size-breakdown b{color:var(--espresso); font-size:15px;}

  /* ===== FOOTER FLOTANTE ===== */
  .footer-order{
    position:fixed; left:0; right:0; bottom:0; z-index:900;
    background:var(--blanco);
    box-shadow:0 -8px 28px rgba(44,24,16,0.16);
    border-top:1px solid var(--linea);
    border-radius:22px 22px 0 0;
    padding:14px 16px max(14px, env(safe-area-inset-bottom));
  }
  .footer-inner{max-width:600px; margin:0 auto;}
  .total-row{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px;
  }
  .total-label{font-size:13.5px; color:var(--tostado); font-weight:600;}
  .total-amount{
    font-family:'Fraunces',serif; font-size:28px; font-weight:700; color:var(--espresso);
  }
  .total-amount span{color:var(--salvia);}

  .obs-toggle{
    width:100%; text-align:left; background:none; border:none; color:var(--tostado);
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; cursor:pointer;
    padding:4px 2px; margin-bottom:6px; display:flex; align-items:center; gap:5px;
  }
  .obs-wrap{display:none; margin-bottom:10px;}
  .obs-wrap.open{display:block;}
  .obs-input{
    width:100%; padding:12px 14px; border-radius:12px;
    border:1.5px solid var(--linea); font-size:15px;
    color:var(--espresso); background:var(--crema-2);
    font-family:'Inter',sans-serif;
  }
  .obs-input:focus{outline:none; border-color:var(--caramelo); background:#fff;}

  .btn-confirm{
    background:var(--salvia); color:#fff; border:none;
    padding:16px; font-size:17px; border-radius:14px;
    cursor:pointer; font-weight:700; width:100%;
    font-family:'Inter',sans-serif; letter-spacing:.3px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:background .15s, transform .1s;
  }
  .btn-confirm:active{transform:scale(0.98); background:var(--salvia-dark);}
  .btn-confirm:disabled{background:#c9c0ae; cursor:not-allowed;}
  .btn-confirm .arrow{transition:transform .15s;}

  /* ===== EXITO ===== */
  #pantalla-exito{
    display:none; min-height:100vh; align-items:center; justify-content:center;
    padding:24px; flex-direction:column;
  }
  .exito-card{
    background:#fff; border-radius:28px; padding:42px 30px;
    text-align:center; max-width:380px; width:100%;
    box-shadow:var(--sombra-fuerte); border:1px solid var(--linea);
  }
  .exito-icon{
    width:64px; height:64px; border-radius:50%; background:var(--salvia);
    color:#fff; font-size:32px; display:flex; align-items:center; justify-content:center;
    margin:0 auto 18px;
  }
  .exito-card h1{color:var(--espresso); font-size:24px; margin-bottom:6px;}
  .exito-card .sub{color:var(--tostado); font-size:15px; font-family:'Inter',sans-serif;}
  .numero-orden{
    font-family:'Fraunces',serif; font-size:88px; line-height:1; color:var(--salvia);
    font-weight:700; margin:14px 0;
  }
  .exito-card .nota{
    color:var(--tostado); font-size:13.5px; margin-top:16px;
    font-family:'Inter',sans-serif; background:var(--crema-2); border-radius:10px; padding:10px;
  }

  /* ===== EMPTY / VALIDATION ===== */
  .toast{
    position:fixed; bottom:158px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--espresso); color:var(--crema); padding:12px 22px; border-radius:999px;
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px; z-index:2000;
    opacity:0; transition:.25s; box-shadow:var(--sombra-fuerte); pointer-events:none;
    max-width:88vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ===== RESPONSIVE ===== */
  @media (min-width: 640px){
    .menu-container{grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:18px; padding:26px 24px 10px;}
    .brand-row{padding:18px 24px 12px;}
    .tabs{padding:0 24px 16px;}
  }
  @media (min-width: 900px){
    .menu-container{grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px; max-width:1280px;}
  }
  @media (min-width: 1024px){
    .menu-container{grid-template-columns:repeat(auto-fill, minmax(200px, 230px)); gap:20px; justify-content:center;}
    body{padding-bottom:0;}
    .footer-order{
      position:static; border-radius:var(--radio); max-width:680px; margin:36px auto 40px;
      box-shadow:var(--sombra-fuerte);
    }
    .total-amount{font-size:32px;}
    .btn-confirm{padding:18px;}
  }
  @media (min-width: 1280px){
    .menu-container{grid-template-columns:repeat(auto-fill, minmax(195px, 220px)); gap:20px;}
  }
  @media (max-width: 380px){
    .menu-container{grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:12px; padding:16px 12px 10px;}
    .product-card{padding:11px 10px 13px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition-duration:0.01ms !important; animation-duration:0.01ms !important;}
  }
</style>
</head>
<body>

<div id="pantalla-pedido">
  <header class="app-header">
    <div class="brand-row">
      <div class="brand">
        <div class="brand-mark">☕</div>
        <div class="brand-text">
          <h1>Ágape Coffee</h1>
          <span>Quiosco de pedidos</span>
        </div>
      </div>
      <button class="cart-pill" type="button" onclick="irAFooter()" aria-label="Ver total del pedido">
        <span>L. <span id="cart-total">0.00</span></span>
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" onclick="mostrarSeccion('comida', this)"><span class="tab-emoji">🍔</span>Comida</button>
      <button class="tab-btn" onclick="mostrarSeccion('calientes', this)"><span class="tab-emoji">☕</span>Bebidas Calientes</button>
      <button class="tab-btn" onclick="mostrarSeccion('heladas', this)"><span class="tab-emoji">🥤</span>Bebidas Frías</button>
    </nav>
  </header>

  <main>
    <div id="comida" class="seccion-productos active menu-container"></div>
    <div id="calientes" class="seccion-productos menu-container"></div>
    <div id="heladas" class="seccion-productos menu-container"></div>
  </main>

  <div class="footer-order" id="footer-order">
    <div class="footer-inner">
      <div class="total-row">
        <span class="total-label">Total a pagar</span>
        <div class="total-amount">L. <span id="total-general">0.00</span></div>
      </div>

      <button type="button" class="obs-toggle" onclick="toggleObs()">
        <span id="obs-icon">＋</span> <span id="obs-label">Agregar observaciones</span>
      </button>
      <div class="obs-wrap" id="obs-wrap">
        <input type="text" id="observaciones" class="obs-input" placeholder="Ej: Leche descremada, sin azúcar, café para llevar...">
      </div>

      <button type="button" class="btn-confirm" id="btn-confirm" onclick="enviarPedido()">
        <span id="confirm-label">Selecciona al menos un producto</span>
      </button>
    </div>
  </div>
</div>

<div id="pantalla-exito">
  <div class="exito-card">
    <div class="exito-icon">✓</div>
    <h1>¡Pedido recibido!</h1>
    <p class="sub">Tu número de orden es</p>
    <div class="numero-orden" id="num-orden">#--</div>
    <p class="nota">Por favor espera que llamen tu número en barra.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MENU = {
    'p_baleada': { nombre: 'Baleadas', precio: 60, img: 'placeholder-comida.jpg', cat: 'comida' },
    'p_nachos': { nombre: 'Nachos', precio: 80, img: 'placeholder-comida.jpg', cat: 'comida' },
    'p_burrita': { nombre: 'Burritas', precio: 70, img: 'placeholder-comida.jpg', cat: 'comida' },
    'p_almuerzo1': { nombre: 'Pollo, Arroz y Ensalada Verde', precio: 140, img: 'placeholder-comida.jpg', cat: 'comida', sub: 'almuerzos' },
    'p_almuerzo2': { nombre: 'Chuleta Ahumada, Arroz y Ensalada', precio: 145, img: 'placeholder-comida.jpg', cat: 'comida', sub: 'almuerzos' },
    'p_almuerzo3': { nombre: 'Carne Asada, Arroz, Frijoles y Queso', precio: 150, img: 'placeholder-comida.jpg', cat: 'comida', sub: 'almuerzos' },

    'c_ame8': { nombre: 'Americano', precio: 35, img: 'americano.jpg', cat: 'calientes', sizes:{'8oz':35,'12oz':40}, sizeGroup:'card_americano' },
    'c_ame12': { nombre: 'Americano', precio: 40, img: 'americano.jpg', cat: 'calientes', hidden:true },
    'c_esp8': { nombre: 'Espresso', precio: 25, img: 'espresso.jpg', cat: 'calientes', vol:'8oz' },
    'c_cort8': { nombre: 'Cortadito', precio: 25, img: 'cortadito.jfif', cat: 'calientes', vol:'8oz' },
    'c_cap8': { nombre: 'Capuchino', precio: 60, img: 'capuchino.jpg', cat: 'calientes', sizes:{'8oz':60,'12oz':65}, sizeGroup:'card_capuchino' },
    'c_cap12': { nombre: 'Capuchino', precio: 65, img: 'capuchino.jpg', cat: 'calientes', hidden:true },
    'c_lat8': { nombre: 'Latte', precio: 60, img: 'latte.jpg', cat: 'calientes', sizes:{'8oz':60,'12oz':65}, sizeGroup:'card_latte' },
    'c_lat12': { nombre: 'Latte', precio: 65, img: 'latte.jpg', cat: 'calientes', hidden:true },
    'c_bom8': { nombre: 'Café Bombón', precio: 65, img: 'bombon.jpeg', cat: 'calientes', vol:'8oz' },
    'c_moc12': { nombre: 'Mocha', precio: 70, img: 'mocha.jpg', cat: 'calientes', vol:'12oz' },
    'c_chai8': { nombre: 'Chai Caliente', precio: 60, img: 'chai.jfif', cat: 'calientes', sizes:{'8oz':60,'12oz':65}, sizeGroup:'card_chaicaliente' },
    'c_chai12': { nombre: 'Chai Caliente', precio: 65, img: 'chai.jfif', cat: 'calientes', hidden:true },
    'c_pin8': { nombre: 'Pinol', precio: 55, img: 'pinol.jpg', cat: 'calientes', sizes:{'8oz':55,'12oz':60}, sizeGroup:'card_pinol' },
    'c_pin12': { nombre: 'Pinol', precio: 60, img: 'pinol.jpg', cat: 'calientes', hidden:true },
    'c_cho8': { nombre: 'Chocolate', precio: 60, img: 'chocolate.jpg', cat: 'calientes', sizes:{'8oz':60,'12oz':65}, sizeGroup:'card_chocolate' },
    'c_cho12': { nombre: 'Chocolate', precio: 65, img: 'chocolate.jpg', cat: 'calientes', hidden:true },
    'c_te12': { nombre: 'Té (Sabores)', precio: 25, img: 'te.jpg', cat: 'calientes', vol:'12oz' },
    'c_tis12': { nombre: 'Tisanas', precio: 75, img: 'tisanas.jpg', cat: 'calientes', vol:'12oz' },

    'f_bat_fre': { nombre: 'Batido Fresa', precio: 65, img: 'batidofresa.jfif', cat: 'heladas', vol:'16oz' },
    'f_bat_ban': { nombre: 'Batido Banano', precio: 65, img: 'batidobanana.jfif', cat: 'heladas', vol:'16oz' },
    'f_bat_cho': { nombre: 'Batido Chocolate', precio: 65, img: 'batidochoco.jfif', cat: 'heladas', vol:'16oz' },
    'f_sm_man': { nombre: 'Smoothie Mango', precio: 65, img: 'smotmango.jfif', cat: 'heladas', vol:'16oz' },
    'f_sm_fre': { nombre: 'Smoothie Fresa', precio: 65, img: 'smotfresa.jfif', cat: 'heladas', vol:'16oz' },
    'f_sm_mv': { nombre: 'Smoothie Manzana Verde', precio: 65, img: 'smotmanza.jfif', cat: 'heladas', vol:'16oz' },
    'f_sm_ma': { nombre: 'Smoothie Mora Azul', precio: 65, img: 'smotmora.jpg', cat: 'heladas', vol:'16oz' },
    'f_sm_pc': { nombre: 'Smoothie Piña Colada', precio: 65, img: 'smotpi.jpg', cat: 'heladas', vol:'16oz' },
    'f_sm_san': { nombre: 'Smoothie Sandía', precio: 65, img: 'smotsandia.jfif', cat: 'heladas', vol:'16oz' },
    'f_sm_mar': { nombre: 'Smoothie Maracuyá', precio: 65, img: 'smotmara.avif', cat: 'heladas', vol:'16oz' },
    'f_sm_lfm': { nombre: 'Limón con Fresa/Menta', precio: 70, img: 'limofresa.jfif', cat: 'heladas', vol:'16oz' },
    'f_lim50': { nombre: 'Limonada Menta/Fresa', precio: 50, img: 'limofresa.jfif', cat: 'heladas', vol:'16oz' },
    'f_fr_oreo': { nombre: 'Frappé de Oreo', precio: 75, img: 'frapeoreo.jfif', cat: 'heladas', vol:'16oz' },
    'f_ic_lat': { nombre: 'Iced Latte', precio: 65, img: 'icedlatte.jfif', cat: 'heladas', vol:'16oz' },
    'f_ic_car': { nombre: 'Iced Caramel Latte', precio: 70, img: 'icedcaramellatte.jfif', cat: 'heladas', vol:'16oz' },
    'f_ic_or': { nombre: 'Iced Caramel Oreo', precio: 70, img: 'icedcarameloreo.jfif', cat: 'heladas', vol:'16oz' },
    'f_chai': { nombre: 'Chai Frío', precio: 70, img: 'chaifrio.jfif', cat: 'heladas', vol:'16oz' },
    'f_te': { nombre: 'Té Frío', precio: 50, img: 'tefrio.jfif', cat: 'heladas', vol:'16oz' },
    'f_jug': { nombre: 'Jugos', precio: 50, img: 'jugos.jfif', cat: 'heladas', vol:'16oz' },
    'f_gran': { nombre: 'Granita de Café', precio: 60, img: 'granitacafe.jfif', cat: 'heladas', vol:'16oz' }
};

const cantidades = {};
Object.keys(MENU).forEach(id => cantidades[id] = 0);

// Relación explícita tamaño -> id real del MENU (clave para el cálculo de totales)
const RELACION_TAMANOS = {
  'card_americano': { '8oz': 'c_ame8', '12oz': 'c_ame12' },
  'card_capuchino': { '8oz': 'c_cap8', '12oz': 'c_cap12' },
  'card_latte':     { '8oz': 'c_lat8', '12oz': 'c_lat12' },
  'card_chaicaliente': { '8oz': 'c_chai8', '12oz': 'c_chai12' },
  'card_pinol':     { '8oz': 'c_pin8', '12oz': 'c_pin12' },
  'card_chocolate': { '8oz': 'c_cho8', '12oz': 'c_cho12' }
};

function renderSizeCard(sizeGroup, baseId){
  const item = MENU[baseId];
  const sizeEntries = Object.entries(item.sizes);
  const ids = sizeEntries.map(([sz]) => RELACION_TAMANOS[sizeGroup][sz]);
  const sizeBtns = sizeEntries.map(([sz, price], i) =>
    `<button type="button" class="size-btn ${i===0?'selected':''}" onclick="seleccionarTamano('${sizeGroup}', '${sz}', ${price})">${sz}</button>`
  ).join('');
  const breakdown = sizeEntries.map(([sz], i) => `${sz}: <b id="${ids[i]}">0</b>`).join(' &nbsp;|&nbsp; ');

  return `
    <div class="product-card" id="${sizeGroup}">
      <div class="qty-flag" id="flag_${sizeGroup}">0</div>
      <div class="product-img-wrap"><img class="product-img" src="${item.img}" alt="${item.nombre}" loading="lazy"></div>
      <h3 class="pname">${item.nombre}</h3>
      <div class="size-selector">${sizeBtns}</div>
      <div class="price-tag">L. <span class="precio-dinamico">${sizeEntries[0][1].toFixed(2)}</span></div>
      <div class="controls with-sizes">
        <button type="button" class="btn-qty minus" onclick="cambiarConTamano('${sizeGroup}', -1)">−</button>
        <div class="size-breakdown" id="breakdown_${sizeGroup}">${breakdown}</div>
        <button type="button" class="btn-qty" onclick="cambiarConTamano('${sizeGroup}', 1)">+</button>
      </div>
    </div>`;
}

function renderSimpleCard(id){
  const item = MENU[id];
  return `
    <div class="product-card" id="card_${id}">
      <div class="qty-flag" id="flag_${id}">0</div>
      <div class="product-img-wrap"><img class="product-img" src="${item.img}" alt="${item.nombre}" loading="lazy"></div>
      <h3 class="pname"><span class="pname-text">${item.nombre}</span>${item.vol ? `<span class="vol-tag">${item.vol}</span>` : ''}</h3>
      <div class="price-tag">L. ${item.precio.toFixed(2)}</div>
      <div class="controls">
        <button type="button" class="btn-qty minus" onclick="cambiarSimple('${id}', -1)">−</button>
        <span class="qty-display" id="${id}">0</span>
        <button type="button" class="btn-qty" onclick="cambiarSimple('${id}', 1)">+</button>
      </div>
    </div>`;
}

function buildComida(){
  const cont = document.getElementById('comida');
  let html = `<div class="section-intro"><h2>Comida</h2><span class="section-count">6 opciones</span></div>`;
  html += renderSimpleCard('p_baleada') + renderSimpleCard('p_nachos') + renderSimpleCard('p_burrita');
  html += `<div class="row-titulo"><h3>🍲 Almuerzos</h3></div>`;
  html += renderSimpleCard('p_almuerzo1') + renderSimpleCard('p_almuerzo2') + renderSimpleCard('p_almuerzo3');
  cont.innerHTML = html;
}

function buildCalientes(){
  const cont = document.getElementById('calientes');
  let html = `<div class="section-intro"><h2>Bebidas Calientes</h2><span class="section-count">14 opciones</span></div>`;
  html += renderSizeCard('card_americano', 'c_ame8');
  html += renderSimpleCard('c_esp8');
  html += renderSimpleCard('c_cort8');
  html += renderSizeCard('card_capuchino', 'c_cap8');
  html += renderSizeCard('card_latte', 'c_lat8');
  html += renderSimpleCard('c_bom8');
  html += renderSimpleCard('c_moc12');
  html += renderSizeCard('card_chaicaliente', 'c_chai8');
  html += renderSizeCard('card_pinol', 'c_pin8');
  html += renderSizeCard('card_chocolate', 'c_cho8');
  html += renderSimpleCard('c_te12');
  html += renderSimpleCard('c_tis12');
  cont.innerHTML = html;
}

function buildHeladas(){
  const cont = document.getElementById('heladas');
  const ids = ['f_bat_fre','f_bat_ban','f_bat_cho','f_sm_man','f_sm_fre','f_sm_mv','f_sm_ma','f_sm_pc','f_sm_san','f_sm_mar','f_sm_lfm','f_lim50','f_fr_oreo','f_ic_lat','f_ic_car','f_ic_or','f_chai','f_te','f_jug','f_gran'];
  let html = `<div class="section-intro"><h2>Bebidas Frías</h2><span class="section-count">${ids.length} opciones</span></div>`;
  html += ids.map(renderSimpleCard).join('');
  cont.innerHTML = html;
}

buildComida();
buildCalientes();
buildHeladas();

function mostrarSeccion(seccionId, boton){
  document.querySelectorAll('.seccion-productos').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(seccionId).classList.add('active');
  boton.classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function actualizarFlag(id, cardId){
  const total = cantidades[id] || 0;
  const flag = document.getElementById('flag_' + (cardId||id));
  const card = document.getElementById((cardId ? '' : 'card_') + (cardId||id));
  if(flag){
    flag.innerText = total;
    flag.classList.toggle('show', total > 0);
  }
  if(card) card.classList.toggle('has-qty', total > 0);
}

function actualizarFlagGrupo(sizeGroup){
  const ids = Object.values(RELACION_TAMANOS[sizeGroup]);
  const total = ids.reduce((sum, id) => sum + (cantidades[id]||0), 0);
  const flag = document.getElementById('flag_' + sizeGroup);
  const card = document.getElementById(sizeGroup);
  if(flag){
    flag.innerText = total;
    flag.classList.toggle('show', total > 0);
  }
  if(card) card.classList.toggle('has-qty', total > 0);
}

function calcularTotalGeneral(){
  let acumulado = 0;
  let items = 0;
  for(let id in MENU){
    const cant = cantidades[id] || 0;
    acumulado += cant * MENU[id].precio;
    items += cant;
  }
  document.getElementById('total-general').innerText = acumulado.toFixed(2);
  document.getElementById('cart-total').innerText = acumulado.toFixed(2);
  document.getElementById('cart-count').innerText = items;

  const btn = document.getElementById('btn-confirm');
  const label = document.getElementById('confirm-label');
  if(items > 0){
    btn.disabled = false;
    label.innerHTML = `Confirmar pedido <span class="arrow">→</span>`;
  } else {
    btn.disabled = true;
    label.innerText = 'Selecciona al menos un producto';
  }
}

function cambiarSimple(id, valor){
  const elemento = document.getElementById(id);
  if(!elemento) return;
  let nuevo = (cantidades[id]||0) + valor;
  nuevo = nuevo < 0 ? 0 : nuevo;
  cantidades[id] = nuevo;
  elemento.innerText = nuevo;
  actualizarFlag(id);
  calcularTotalGeneral();
}

function seleccionarTamano(cardId, tamano, precio){
  const tarjeta = document.getElementById(cardId);
  tarjeta.querySelectorAll('.size-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.innerText === tamano);
  });
  tarjeta.querySelector('.precio-dinamico').innerText = precio.toFixed(2);
}

function cambiarConTamano(cardId, valor){
  const tarjeta = document.getElementById(cardId);
  const botonSeleccionado = tarjeta.querySelector('.size-btn.selected');
  const tamanoActivo = botonSeleccionado.innerText;
  const idReal = RELACION_TAMANOS[cardId][tamanoActivo];

  let nuevo = (cantidades[idReal]||0) + valor;
  nuevo = nuevo < 0 ? 0 : nuevo;
  cantidades[idReal] = nuevo;
  document.getElementById(idReal).innerText = nuevo;
  actualizarFlagGrupo(cardId);
  calcularTotalGeneral();
}

function toggleObs(){
  const wrap = document.getElementById('obs-wrap');
  const icon = document.getElementById('obs-icon');
  const label = document.getElementById('obs-label');
  const open = wrap.classList.toggle('open');
  icon.innerText = open ? '−' : '＋';
  label.innerText = open ? 'Observaciones' : 'Agregar observaciones';
  if(open) document.getElementById('observaciones').focus();
}

function irAFooter(){
  document.getElementById('footer-order').scrollIntoView({behavior:'smooth', block:'end'});
  if(window.innerWidth >= 1024){
    document.getElementById('footer-order').scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function mostrarToast(msg){
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2600);
}

// Número de orden correlativo, reiniciado cada día. Se guarda en este dispositivo/quiosco.
function obtenerSiguienteOrden(){
  const hoy = new Date().toISOString().slice(0,10); // YYYY-MM-DD
  let data;
  try{
    data = JSON.parse(localStorage.getItem('agape_orden') || '{}');
  }catch(e){
    data = {};
  }
  if(data.fecha !== hoy){
    data = { fecha: hoy, ultimo: 0 };
  }
  data.ultimo += 1;
  try{
    localStorage.setItem('agape_orden', JSON.stringify(data));
  }catch(e){
    // Si localStorage no está disponible (modo privado, etc.), seguimos sin persistencia.
  }
  return data.ultimo;
}

async function enviarPedido(){
  let detalle = "";
  let acumulado = 0;

  for(let id in MENU){
    const cant = cantidades[id] || 0;
    if(cant > 0){
      detalle += MENU[id].nombre + " (" + cant + "), ";
      acumulado += cant * MENU[id].precio;
    }
  }

  if(detalle === ""){
    mostrarToast("Selecciona al menos un producto para continuar 🙂");
    return;
  }

  // Verificación temprana de conexión. No es 100% infalible (puede haber
  // "internet" pero sin salida real), pero cubre el caso más común: wifi caído.
  if(!navigator.onLine){
    mostrarToast("Sin conexión a internet. Revisa el wifi e intenta de nuevo.");
    return;
  }

  const btn = document.getElementById('btn-confirm');
  const label = document.getElementById('confirm-label');
  btn.disabled = true;
  label.innerText = "Enviando pedido...";

  const obs = document.getElementById('observaciones').value;
  const orden = obtenerSiguienteOrden();
  const totalTexto = "L. " + acumulado.toFixed(2);

  const formData = new FormData();
  formData.append("entry.894611180", detalle);
  formData.append("entry.1139720569", orden);
  formData.append("entry.1093917841", obs);
  formData.append("entry.801011885", totalTexto);

  try{
    // mode:"no-cors" impide leer si Google aceptó el formulario (limitación
    // del navegador, no nuestra). Lo que SÍ podemos detectar aquí es un fallo
    // de red real: sin conexión, DNS, timeout, servidor inalcanzable, etc.
    await fetch("https://docs.google.com/forms/d/1_XJMvDDZEmWozeLuPPqkpL7ytOV6bg8X5iH1beyeYWE/formResponse", {
      method: "POST",
      body: formData,
      mode: "no-cors"
    });
  }catch(e){
    // Falló el envío a nivel de red: no mostramos la pantalla de éxito.
    btn.disabled = false;
    label.innerHTML = `Confirmar pedido <span class="arrow">→</span>`;
    mostrarToast("No se pudo enviar el pedido. Revisa tu conexión e intenta de nuevo.");
    return;
  }

  document.getElementById('pantalla-pedido').style.display = "none";
  document.getElementById('pantalla-exito').style.display = "flex";
  document.getElementById('num-orden').innerText = "#" + orden;
  window.scrollTo(0,0);

  setTimeout(() => { location.reload(); }, 6000);
}

calcularTotalGeneral();
</script>
